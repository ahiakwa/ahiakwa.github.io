    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root { --bg:#f7f5f0; --panel:#fff; --text:#1f1e1c; --muted:#6b6257; --line:#e2ddd4; --soft:#ece6de; --accent:#b26b3b; --soft-accent:#f0ebe3; }
    body { background:var(--bg); font-family:system-ui,-apple-system,"Inter","Segoe UI",Roboto,Helvetica,sans-serif; padding:2rem 1.5rem; color:var(--text); }
    .container{ max-width:1280px; margin:0 auto; }
    .header{ text-align:center; margin-bottom:2rem; border-bottom:1px solid var(--line); padding-bottom:1.25rem; }
    .header h1{ font-weight:450; font-size:clamp(1.7rem,3vw,2.2rem); letter-spacing:-.3px; color:#2c2a27; margin-bottom:.5rem; }
    .header h1 span{ font-weight:350; color:var(--accent); background:var(--soft-accent); padding:.1rem .5rem; border-radius:999px; font-size:1.3rem; display:inline-block; vertical-align:middle; }
    .sub{ color:var(--muted); font-size:.92rem; margin-top:.5rem; max-width:760px; margin-inline:auto; line-height:1.45; }
    .status{ margin:0 auto 1.25rem auto; max-width:860px; padding:.8rem 1rem; border-radius:16px; background:#fffdf8; border:1px solid #eadfcf; color:#6a5d4b; font-size:.9rem; line-height:1.45; display:none; }
    .status.ok{ display:block; background:#f8fbf7; border-color:#dfeadf; color:#4c644d; }
    .status.warn{ display:block; background:#fff8f4; border-color:#edd8cf; color:#8b5a44; }
    .toolbar{ display:flex; gap:.75rem; justify-content:center; align-items:center; margin:0 auto 1.25rem auto; flex-wrap:wrap; }
    .toolbar input{ width:min(540px, 100%); border:1px solid #ddd2c6; border-radius:999px; padding:.8rem 1rem; background:#fff; outline:none; font:inherit; }
    .toolbar input:focus{ border-color:#c9b29d; box-shadow:0 0 0 3px rgba(178,107,59,.12); }
    .alphabet-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:1.2rem; }
    .symbol-card{ background:var(--panel); border-radius:28px; padding:1.2rem .8rem 1rem; text-align:center; transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease; box-shadow:0 2px 6px rgba(0,0,0,.02),0 1px 2px rgba(0,0,0,.03); border:1px solid var(--soft); }
    .symbol-card:hover{ transform:translateY(-4px); box-shadow:0 16px 24px -12px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.02); border-color:#dcd2c6; background:#fefefc; }
    .icon-wrapper{ font-size:3.4rem; line-height:1; margin-bottom:.85rem; display:flex; justify-content:center; align-items:center; min-height:84px; }
    .adk{ display:inline-block; line-height:1; font-style:normal; font:normal normal normal 1em/1 'adinkraiconfont'; color:inherit; flex-shrink:0; speak:none; text-transform:none; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    .symbol-name{ font-weight:520; font-size:1rem; letter-spacing:-.2px; color:#2f2c28; margin-bottom:.35rem; background:#faf8f4; display:inline-block; padding:.12rem .55rem; border-radius:999px; }
    .symbol-meaning{ font-size:.75rem; color:#857a6b; text-transform:uppercase; letter-spacing:.3px; font-weight:430; margin-top:.25rem; border-top:1px solid #f0e9e1; padding-top:.55rem; display:inline-block; width:100%; }
    .footer-note{ margin-top:3.5rem; text-align:center; font-size:.75rem; color:#b1a694; border-top:1px solid #e9e2d8; padding-top:1.8rem; letter-spacing:.2px; }
    @media (max-width:580px){ body{ padding:1.1rem; } .alphabet-grid{ gap:.95rem; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); } .icon-wrapper{ font-size:2.8rem; min-height:72px; } .symbol-name{ font-size:.85rem; } }

    const grid = document.getElementById('adinkra-grid');
    const status = document.getElementById('status');
    const search = document.getElementById('search');
    function setStatus(text, kind='ok') { status.textContent = text; status.className = 'status ' + kind; status.style.display = 'block'; }
    function createCard(item) {
      const card = document.createElement('div');
      card.className = 'symbol-card';
      card.dataset.label = item.label.toLowerCase();
      card.dataset.className = item.className.toLowerCase();
      const iconWrapper = document.createElement('div');
      iconWrapper.className = 'icon-wrapper';
      const icon = document.createElement('i');
      icon.className = `adk adk-${item.className}`;
      icon.setAttribute('aria-label', item.label);
      icon.setAttribute('title', `${item.label} · ${item.className}`);
      iconWrapper.appendChild(icon);
      const nameDiv = document.createElement('div');
      nameDiv.className = 'symbol-name';
      nameDiv.textContent = item.label;
      const meaningDiv = document.createElement('div');
      meaningDiv.className = 'symbol-meaning';
      meaningDiv.textContent = item.meaning;
      card.appendChild(iconWrapper); card.appendChild(nameDiv); card.appendChild(meaningDiv);
      return card;
    }
    function render(list) { grid.innerHTML = ''; for (const item of list) grid.appendChild(createCard(item)); setStatus(`Найдено ${list.length} символов из CSS.`, 'ok'); }
    function applyFilter() { const q = search.value.trim().toLowerCase(); const cards = grid.querySelectorAll('.symbol-card'); let visible = 0; cards.forEach(card => { const match = !q || card.dataset.label.includes(q) || card.dataset.className.includes(q); card.style.display = match ? '' : 'none'; if (match) visible++; }); setStatus(q ? `Показано ${visible} символов по запросу “${q}”.` : `Найдено ${cards.length} символов из CSS.`, q ? 'warn' : 'ok'); }
    function init() { const sorted = [...SYMBOLS].sort((a,b) => a.label.localeCompare(b.label, 'ru')); render(sorted); search.addEventListener('input', applyFilter); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once: true }); else init();
