    .header h1 span{ font-weight:350; color:var(--accent); background:var(--soft-accent); padding:.1rem .5rem; border-radius:999px; font-size:1.3rem; display:inline-block; vertical-align:middle; }

    .status.ok{ display:block; background:#f8fbf7; border-color:#dfeadf; color:#4c644d; }
    .status.warn{ display:block; background:#fff8f4; border-color:#edd8cf; color:#8b5a44; }

    .toolbar input{ width:min(540px, 100%); border:1px solid #ddd2c6; border-radius:999px; padding:.8rem 1rem; background:#fff; outline:none; font:inherit; }
    .toolbar input:focus{ border-color:#c9b29d; box-shadow:0 0 0 3px rgba(178,107,59,.12); }
    .alphabet-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:1.2rem; margin-bottom:3rem; }
    .symbol-card{ background:var(--panel); border-radius:28px; padding:1.2rem .8rem 1rem; text-align:center; transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease; box-shadow:0 2px 6px rgba(0,0,0,.02),0 1px 2px rgba(0,0,0,.03); border:1px solid var(--soft); }

    .adk{ display:inline-block; line-height:1; font-style:normal; font:normal normal normal 1em/1 'adinkraiconfont'; color:inherit; flex-shrink:0; speak:none; text-transform:none; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    .symbol-name{ font-weight:520; font-size:1rem; letter-spacing:-.2px; color:#2f2c28; margin-bottom:.35rem; background:#faf8f4; display:inline-block; padding:.12rem .55rem; border-radius:999px; }
    .symbol-meaning{ font-size:.75rem; color:#857a6b; text-transform:uppercase; letter-spacing:.3px; font-weight:430; margin-top:.25rem; border-top:1px solid #f0e9e1; padding-top:.55rem; display:inline-block; width:100%; }
    
    /* ----- НОВЫЙ РАЗДЕЛ: ГЛИФЫ И АЛФАВИТ (Adinkra-Regular.ttf) ----- */
    .glyph-section {
      margin: 2.5rem 0 1rem;
      border-top: 2px solid var(--line);
      padding-top: 2rem;
    }
    .glyph-title {
      font-size: 1.5rem;
      font-weight: 480;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      color: #3c2e23;
    }
    .glyph-title i { color: var(--accent); font-size: 1.4rem; }
    .glyph-sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 1.8rem;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }
    .alphabet-grid.glyph-grid {

    }
    .glyph-card {

      text-align: center;
      border: 1px solid var(--soft);

    .glyph-card:hover {

    }
    .glyph-symbol {

      line-height: 1.2;
      margin-bottom: 0.3rem;
      color: #2b241d;

    .preview-adinkra {

      line-height: 1.4;

    @font-face {

  // ----- РЕНДЕР ОСНОВНОЙ БИБЛИОТЕКИ (иконочный шрифт) -----
  const grid = document.getElementById('adinkra-grid');
  const statusDiv = document.getElementById('status');
  const searchInput = document.getElementById('search');

  function setStatus(text, kind='ok') { 
    statusDiv.textContent = text; 
    statusDiv.className = 'status ' + kind; 
    statusDiv.style.display = 'block'; 
  }
  function createCard(item) {
    const card = document.createElement('div');
    card.className = 'symbol-card';
    card.dataset.label = item.label.toLowerCase();
    card.dataset.className = item.className.toLowerCase();
    const iconWrapper = document.createElement('div');
    iconWrapper.className = 'icon-wrapper';
    const icon = document.createElement('i');
    icon.className = `adk adk-${item.className}`;
    icon.setAttribute('aria-label', item.label);
    icon.setAttribute('title', `${item.label} · ${item.className}`);
    iconWrapper.appendChild(icon);
    const nameDiv = document.createElement('div');
    nameDiv.className = 'symbol-name';
    nameDiv.textContent = item.label;
    const meaningDiv = document.createElement('div');
    meaningDiv.className = 'symbol-meaning';
    meaningDiv.textContent = item.meaning;
    card.appendChild(iconWrapper); card.appendChild(nameDiv); card.appendChild(meaningDiv);
    return card;
  }
  function render(list) { 
    grid.innerHTML = ''; 
    for (const item of list) grid.appendChild(createCard(item)); 
    setStatus(`Найдено ${list.length} символов из CSS.`, 'ok'); 
  }
  function applyFilter() { 
    const q = searchInput.value.trim().toLowerCase(); 
    const cards = grid.querySelectorAll('.symbol-card'); 
    let visible = 0; 
    cards.forEach(card => { 
      const match = !q || card.dataset.label.includes(q) || card.dataset.className.includes(q); 
      card.style.display = match ? '' : 'none'; 
      if (match) visible++; 
    }); 
    setStatus(q ? `Показано ${visible} символов по запросу “${q}”.` : `Найдено ${cards.length} символов из CSS.`, q ? 'warn' : 'ok'); 
  }

  // ----- НОВАЯ СЕКЦИЯ: АЛФАВИТ (A-Z) с использованием Adinkra-Regular.ttf -----
  const alphabetMapping = [
    { letter: "A", name: "Ako (Parrot)" }, { letter: "B", name: "Bese (Sack of cola)" },
    { letter: "C", name: "Chere (Show mercy)" }, { letter: "D", name: "Dame (Checkerboard)" },
    { letter: "E", name: "Epa (Handcuffs)" }, { letter: "F", name: "Fihankra (House)" },
    { letter: "G", name: "Gye Nyame (Supremacy)" }, { letter: "H", name: "Hye Won Hye (Unburnable)" },
    { letter: "I", name: "Inkwa (Tattoo)" }, { letter: "J", name: "Jema (Sun)" },
    { letter: "K", name: "Kintinkantan (Pompousness)" }, { letter: "L", name: "Layers of Life" },
    { letter: "M", name: "Mframadan (Ventilated house)" }, { letter: "N", name: "Nea Onnim (Learning)" },
    { letter: "O", name: "Onyankopon (God)" }, { letter: "P", name: "Pempamsie (Readiness)" },
    { letter: "Q", name: "Quarter moon" }, { letter: "R", name: "Ram (Strength)" },
    { letter: "S", name: "Sankofa (Return)" }, { letter: "T", name: "Tumi (Power)" },
    { letter: "U", name: "Umu (Unity)" }, { letter: "V", name: "Vessel of wisdom" },
    { letter: "W", name: "Wawa Aba (Seed)" }, { letter: "X", name: "Crossroads" },
    { letter: "Y", name: "Yen Ara Asaase Ni (Our land)" }, { letter: "Z", name: "Zigzag (Life's twists)" }
  ];

  const alphabetContainer = document.getElementById('alphabet-mapping');
  function renderAlphabet() {
    if (!alphabetContainer) return;
    alphabetContainer.innerHTML = '';
    for (const item of alphabetMapping) {
      const card = document.createElement('div');
      card.className = 'glyph-card';
      const glyphSpan = document.createElement('div');
      glyphSpan.className = 'glyph-symbol';
      glyphSpan.textContent = item.letter;
      const latinSpan = document.createElement('div');
      latinSpan.className = 'glyph-latin';
      latinSpan.textContent = item.letter;
      const nameSpan = document.createElement('div');
      nameSpan.className = 'glyph-name';
      nameSpan.textContent = item.name;
      card.appendChild(glyphSpan);
      card.appendChild(latinSpan);
      card.appendChild(nameSpan);
      alphabetContainer.appendChild(card);
    }
  }

  // Интерактивный тест алфавитного шрифта
  const testInput = document.getElementById('alphabetTestInput');
  const previewDiv = document.getElementById('alphabetPreview');
  if (testInput && previewDiv) {
    testInput.addEventListener('input', (e) => {
      previewDiv.textContent = e.target.value === '' ? ' ' : e.target.value;
    });
    previewDiv.textContent = testInput.value;
  }

  // Инициализация
  function init() {
    const sorted = [...SYMBOLS].sort((a,b) => a.label.localeCompare(b.label, 'ru'));
    render(sorted);
    searchInput.addEventListener('input', applyFilter);
    renderAlphabet();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once: true }); else init();
</script>
</body>
</html>
