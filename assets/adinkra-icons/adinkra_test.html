<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adinkra алфавит · символы акан</title>

  <!-- Лучше абсолютный путь, чтобы не было сюрпризов с относительными URL -->
  <link rel="stylesheet" href="/assets/adinkra-icons/css/icons.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    :root{
      --bg:#f7f5f0; --panel:#fff; --text:#1f1e1c; --muted:#6b6257;
      --line:#e2ddd4; --soft:#ece6de; --accent:#b26b3b; --soft-accent:#f0ebe3;
    }

    body{
      background:var(--bg);
      font-family:system-ui,-apple-system,"Inter","Segoe UI",Roboto,Helvetica,sans-serif;
      padding:2rem 1.5rem;
      color:var(--text);
    }

    .container{ max-width:1280px; margin:0 auto; }

    .header{
      text-align:center;
      margin-bottom:2rem;
      border-bottom:1px solid var(--line);
      padding-bottom:1.25rem;
    }

    .header h1{
      font-weight:450;
      font-size:clamp(1.7rem,3vw,2.2rem);
      letter-spacing:-.3px;
      color:#2c2a27;
      margin-bottom:.5rem;
    }

    .header h1 span{
      font-weight:350;
      color:var(--accent);
      background:var(--soft-accent);
      padding:.1rem .5rem;
      border-radius:999px;
      font-size:1.3rem;
      display:inline-block;
      vertical-align:middle;
    }

    .sub{
      color:var(--muted);
      font-size:.92rem;
      margin-top:.5rem;
      max-width:720px;
      margin-inline:auto;
      line-height:1.45;
    }

    .status{
      margin:0 auto 1.25rem auto;
      max-width:860px;
      padding:.8rem 1rem;
      border-radius:16px;
      background:#fffdf8;
      border:1px solid #eadfcf;
      color:#6a5d4b;
      font-size:.9rem;
      line-height:1.45;
      display:none;
    }
    .status.ok{ display:block; background:#f8fbf7; border-color:#dfeadf; color:#4c644d; }
    .status.warn{ display:block; background:#fff8f4; border-color:#edd8cf; color:#8b5a44; }

    .alphabet-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:1.2rem;
    }

    .symbol-card{
      background:var(--panel);
      border-radius:28px;
      padding:1.2rem .8rem 1rem;
      text-align:center;
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      box-shadow:0 2px 6px rgba(0,0,0,.02),0 1px 2px rgba(0,0,0,.03);
      border:1px solid var(--soft);
    }

    .symbol-card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 24px -12px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.02);
      border-color:#dcd2c6;
      background:#fefefc;
    }

    .icon-wrapper{
      font-size:3.4rem;
      line-height:1;
      margin-bottom:.85rem;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:84px;
    }

    .icon{
      display:inline-block;
      line-height:1;
      font-style:normal;
      font-size:3.2rem;
      speak:none;
      user-select:none;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:optimizeLegibility;
    }

    /* Подстраховка для icon font */
    [class^="adinkra-"],
    [class*=" adinkra-"]{
      display:inline-block;
      line-height:1;
      font-style:normal;
    }

    [class^="adinkra-"]::before,
    [class*=" adinkra-"]::before{
      font-size:inherit;
      line-height:1;
    }

    .symbol-name{
      font-weight:520;
      font-size:1rem;
      letter-spacing:-.2px;
      color:#2f2c28;
      margin-bottom:.35rem;
      background:#faf8f4;
      display:inline-block;
      padding:.12rem .55rem;
      border-radius:999px;
    }

    .symbol-meaning{
      font-size:.75rem;
      color:#857a6b;
      text-transform:uppercase;
      letter-spacing:.3px;
      font-weight:430;
      margin-top:.25rem;
      border-top:1px solid #f0e9e1;
      padding-top:.55rem;
      display:inline-block;
      width:100%;
    }

    .fallback-mark{
      width:72px;
      height:72px;
      border-radius:50%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#f4eee6;
      color:#9b7c62;
      font-size:1.2rem;
      font-weight:700;
    }

    .footer-note{
      margin-top:3.5rem;
      text-align:center;
      font-size:.75rem;
      color:#b1a694;
      border-top:1px solid #e9e2d8;
      padding-top:1.8rem;
      letter-spacing:.2px;
    }

    @media (max-width:580px){
      body{ padding:1.1rem; }
      .alphabet-grid{ gap:.95rem; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); }
      .icon-wrapper{ font-size:2.8rem; min-height:72px; }
      .icon{ font-size:2.7rem; }
      .symbol-name{ font-size:.85rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Adinkra <span>алфавит</span></h1>
      <div class="sub">✦ символы мудрости, философии и наследия акан ✦</div>
    </div>

    <div id="status" class="status"></div>
    <div id="adinkra-grid" class="alphabet-grid"></div>

    <div class="footer-note">
      каждый символ — часть культурного кода Западной Африки • знаки в алфавитном порядке названий акан
    </div>
  </div>

  <script>
    (function () {
      const adinkraSymbols = [
        { className: "adinkra-adinkrahene", akanName: "Adinkrahene", meaning: "вождь / величие" },
        { className: "adinkra-akoben", akanName: "Akoben", meaning: "военный рог / бдительность" },
        { className: "adinkra-akofena", akanName: "Akofena", meaning: "меч войны / мужество" },
        { className: "adinkra-akokonan", akanName: "Akokonan", meaning: "куриные ноги / забота" },
        { className: "adinkra-akoma", akanName: "Akoma", meaning: "сердце / терпение" },
        { className: "adinkra-akooben", akanName: "Akooben", meaning: "рог войны / решимость" },
        { className: "adinkra-ankra", akanName: "Ankra", meaning: "божественный покой" },
        { className: "adinkra-bese-saka", akanName: "Bese Saka", meaning: "изобилие" },
        { className: "adinkra-duafe", akanName: "Duafe", meaning: "женственность" },
        { className: "adinkra-dwennimmen", akanName: "Dwennimmen", meaning: "смирение + сила" },
        { className: "adinkra-epa", akanName: "Epa", meaning: "правосудие" },
        { className: "adinkra-funtunfunefu", akanName: "Funtunfunefu", meaning: "единство" },
        { className: "adinkra-gye-nyame", akanName: "Gye Nyame", meaning: "всемогущество Бога" },
        { className: "adinkra-hye-wo-nhye", akanName: "Hye Wo Nhye", meaning: "бессмертие души" },
        { className: "adinkra-mate-masie", akanName: "Mate Masie", meaning: "мудрость" },
        { className: "adinkra-nea-ope-se-obeye", akanName: "Nea Ope Se Obeye", meaning: "действие / воля" },
        { className: "adinkra-nkyinkyim", akanName: "Nkyinkyim", meaning: "инициатива" },
        { className: "adinkra-nsoromma", akanName: "Nsoromma", meaning: "звезда / руководство" },
        { className: "adinkra-nyame-nwu-na-mawu", akanName: "Nyame Nwu Na Mawu", meaning: "бессмертие духа" },
        { className: "adinkra-nyansapo", akanName: "Nyansapo", meaning: "узел мудрости" },
        { className: "adinkra-okodee-mmowere", akanName: "Okodee Mmowere", meaning: "отвага" },
        { className: "adinkra-osram-ne-nsoromma", akanName: "Osram Ne Nsoromma", meaning: "любовь и верность" },
        { className: "adinkra-owuo-atedie", akanName: "Owuo Atedie", meaning: "неизбежность" },
        { className: "adinkra-sankofa", akanName: "Sankofa", meaning: "уроки предков" },
        { className: "adinkra-woforo-dua", akanName: "Woforo Dua", meaning: "поддержка" },
        { className: "adinkra-ako", akanName: "Ako", meaning: "красноречие" },
        { className: "adinkra-nyame-nwu", akanName: "Nyame Nwu", meaning: "бессмертие Бога" }
      ];

      const grid = document.getElementById("adinkra-grid");
      const status = document.getElementById("status");

      // Если в CSS есть опечатки/альтернативные имена, можно сюда добавить алиасы
      const aliases = {
        "adinkra-akoben": ["adinkra-akoben", "adinkra-akooben"],
        "adinkra-akooben": ["adinkra-akooben", "adinkra-akoben"]
      };

      function createIcon(className) {
        const i = document.createElement("i");
        i.className = `icon ${className}`;
        return i;
      }

      function createCard(sym) {
        const card = document.createElement("div");
        card.className = "symbol-card";

        const iconWrapper = document.createElement("div");
        iconWrapper.className = "icon-wrapper";

        const iconCandidates = aliases[sym.className] || [sym.className];
        const icon = createIcon(iconCandidates[0]);

        icon.setAttribute("aria-label", `Adinkra: ${sym.akanName}`);
        icon.setAttribute("title", sym.akanName);

        // Если первый вариант не сработает визуально, пробуем второй
        requestAnimationFrame(() => {
          const content = getComputedStyle(icon, "::before").content;
          if (!content || content === "none" || content === '""' || content === "normal") {
            for (let idx = 1; idx < iconCandidates.length; idx++) {
              const test = createIcon(iconCandidates[idx]);
              iconWrapper.replaceChildren(test);
              const testContent = getComputedStyle(test, "::before").content;
              if (testContent && testContent !== "none" && testContent !== '""' && testContent !== "normal") {
                return;
              }
            }
            iconWrapper.replaceChildren(Object.assign(document.createElement("span"), {
              className: "fallback-mark",
              textContent: "A"
            }));
          }
        });

        iconWrapper.appendChild(icon);

        const nameDiv = document.createElement("div");
        nameDiv.className = "symbol-name";
        nameDiv.textContent = sym.akanName;

        const meaningDiv = document.createElement("div");
        meaningDiv.className = "symbol-meaning";
        meaningDiv.textContent = sym.meaning;

        card.appendChild(iconWrapper);
        card.appendChild(nameDiv);
        card.appendChild(meaningDiv);

        return card;
      }

      function render() {
        grid.innerHTML = "";
        const sorted = [...adinkraSymbols].sort((a, b) =>
          a.akanName.localeCompare(b.akanName, "en")
        );

        for (const sym of sorted) {
          grid.appendChild(createCard(sym));
        }

        status.textContent = "Готово: символы отрисованы напрямую по классам из списка.";
        status.className = "status ok";
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", render, { once: true });
      } else {
        render();
      }
    })();
  </script>
</body>
</html>
